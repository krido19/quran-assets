<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f5f5f5;
            color: #333;
        }
        .container {
            text-align: center;
            padding: 2rem;
            background: white;
            border-radius: 1rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-width: 90%;
            width: 300px;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #10b981; /* Emerald-500 to match Islamic theme */
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        h2 {
            margin-top: 0;
            color: #10b981;
        }
        p {
            color: #666;
            margin-bottom: 0;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h2>Signup</h2>
        <p>Redirecting you to the signup page...</p>
        <script>
            // You can configure the destination URL here
            // const destination = "https://example.com/signup";
            // if (destination) {
            //     window.location.href = destination;
            // }
            
            // Example: Redirect to a deep link or another page after a delay
            // setTimeout(() => {
            //     // window.location.href = "...";
            // }, 1000);
        </script>
    </div>
</body>
</html>
